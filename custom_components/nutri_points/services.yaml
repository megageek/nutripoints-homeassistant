      selector:
        text:
    logged_at:
      name: Logged at
      description: Optional ISO timestamp. Supports templates.
      required: false
      selector:
        text:

set_steps:
  name: Set steps
  description: Upsert a daily step total in Nutri Points.
  fields:
    entry_id:
      name: Entry id
      required: false
      selector:
        text:
    steps:
      name: Steps
      description: Supports templates.
      required: true
      selector:
        text:
    mode:
      name: Update mode
      required: false
      selector:
        select:
          options:
            - replace_total
            - add_delta
    applies_to_date:
      name: Applies-to date
      description: Optional YYYY-MM-DD. Supports templates.
      required: false
      selector:
        text:
