        text:

log_drink:
  name: Log drink
  description: Create a drink log entry in Nutri Points.
  fields:
    entry_id:
      name: Entry id
      required: false
      selector:
        text:
    drink_type_id:
      name: Drink type id
      description: Optional numeric drink type id. Supports templates. Provide this or drink_type_name.
      required: false
      selector:
        text:
    drink_type_name:
      name: Drink type name
      description: Optional drink type name. Supports templates. Provide this or drink_type_id.
      required: false
      selector:
        text:
    volume_ml:
      name: Volume (ml)
      description: Signed integer milliliters. Supports templates. Positive adds, negative deducts.
      required: true
      selector:
        text:
    preset_id:
      name: Preset id
      description: Optional preset id for metadata only. Supports templates.
      required: false
      selector:
        text:
    applies_to_date:
      name: Applies-to date
      description: Optional YYYY-MM-DD. Supports templates.
      required: false
      selector:
        text:
    logged_at:
      name: Logged at
      description: Optional ISO timestamp. Supports templates.
      required: false
      selector:
        text:

